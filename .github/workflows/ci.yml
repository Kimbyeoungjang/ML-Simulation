name: TileForge CI
on:
  push:
  pull_request:
jobs:
  basic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:ci
        env:
          TILEFORGE_DISABLE_SQLITE: "1"
      - run: npm run build
  mock-external-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:windows-scripts
      - name: Validate mock external tools
        run: >
          npx tsx -r tsconfig-paths/register scripts/validate-external.ts
          --require-external
          --scalesim-cmd "npx tsx $GITHUB_WORKSPACE/scripts/mock-scalesim.ts"
          --iree-cmd "npx tsx $GITHUB_WORKSPACE/scripts/mock-iree-compile.ts"
        env:
          TILEFORGE_DETERMINISTIC: "1"
      - run: npm run test:advanced
        env:
          TILEFORGE_DETERMINISTIC: "1"
  real-external-tools:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: npm ci
      - name: Install SCALE-Sim and IREE
        run: |
          npm run setup:external
          python3 -m pip list | grep -E 'scale|iree|numpy' || true
          which iree-compile || true
          iree-compile --version || python3 -m iree.compiler.tools.core --version
      - run: npm run doctor:external
      - name: Validate external tools
        run: npm run validate:external:required
      - name: Upload external validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-validation-diagnostics
          path: |
            .tileforge/external-validation/**
            external/SCALE-Sim/**/*.py
          if-no-files-found: ignore
